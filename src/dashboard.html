<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAI Moderation Dashboard</title>
    <style>
      :root {
        --bg: #0f1220;
        --panel: #191e33;
        --line: #2a3358;
        --text: #e9eeff;
        --muted: #a4b0d8;
        --ok: #2bc48a;
        --warn: #ffb547;
        --bad: #ff5d7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(1200px 700px at 20% -20%, #233063, var(--bg));
        color: var(--text);
      }

      .wrap {
        padding: 14px;
        min-height: 100vh;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(16, 20, 35, 0.6);
      }

      .status[data-state="connected"] {
        color: var(--ok);
      }

      .status[data-state="closed"] {
        color: var(--bad);
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .item {
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(34, 43, 75, 0.6), rgba(23, 29, 50, 0.7));
        border-radius: 10px;
        padding: 10px;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .user {
        font-weight: 600;
        color: var(--text);
        margin: 6px 0;
      }

      .text {
        font-size: 13px;
        line-height: 1.4;
      }

      .verdict {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid transparent;
      }

      .verdict.allow {
        color: var(--ok);
        border-color: rgba(43, 196, 138, 0.4);
        background: rgba(43, 196, 138, 0.1);
      }

      .verdict.flag {
        color: var(--warn);
        border-color: rgba(255, 181, 71, 0.4);
        background: rgba(255, 181, 71, 0.1);
      }

      .verdict.block {
        color: var(--bad);
        border-color: rgba(255, 93, 122, 0.4);
        background: rgba(255, 93, 122, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title">SAI Moderation Dashboard</div>
        <div id="status" class="status" data-state="connecting">Connecting...</div>
      </div>
      <div id="list" class="list"></div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("list");
      const maxItems = 100;

      function setStatus(text, state) {
        statusEl.textContent = text;
        statusEl.dataset.state = state;
      }

      function formatTime(value) {
        const date = value ? new Date(value) : new Date();
        return date.toLocaleTimeString();
      }

      function addItem(payload) {
        const item = document.createElement("article");
        item.className = "item";

        const verdict = String(payload.verdict || "flag").toLowerCase();
        const eventType = payload.eventType || "moderation.result";
        const username = payload.username || payload.operatorId || "unknown";
        const text = payload.text || payload.reason || "(no text)";
        const messageId = payload.messageId || "n/a";

        item.innerHTML = `
          <div class="meta">
            <span>${formatTime(payload.receivedAt)}</span>
            <span>#${messageId}</span>
          </div>
          <div class="user">${username}</div>
          <div class="text">${text}</div>
          <div class="meta" style="margin-top:8px;">
            <span>${eventType}</span>
            <span class="verdict ${verdict}">${verdict}</span>
          </div>
        `;

        listEl.prepend(item);
        while (listEl.children.length > maxItems) {
          listEl.removeChild(listEl.lastElementChild);
        }
      }

      function connect() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${location.host}/ws?channel=dashboard`);

        setStatus("Connecting...", "connecting");

        socket.addEventListener("open", () => {
          setStatus("Live", "connected");
        });

        socket.addEventListener("message", (event) => {
          try {
            const payload = JSON.parse(event.data);
            addItem(payload);
          } catch {
            // ignore malformed messages
          }
        });

        socket.addEventListener("close", () => {
          setStatus("Disconnected (retrying)", "closed");
          setTimeout(connect, 1500);
        });
      }

      connect();
    </script>
  </body>
</html>
